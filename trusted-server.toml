[[handlers]]
path = "^/secure"
username = "user"
password = "pass"

[publisher]
domain = "test-publisher.com"
cookie_domain = ".test-publisher.com"
origin_url = "https://origin.test-publisher.com"
proxy_secret = "change-me-proxy-secret"

[synthetic]
counter_store = "counter_store"
opid_store = "opid_store"
secret_key = "trusted-server"
# Possible values
#   - "client_ip"
#   - "user_agent"
#   - "first_party_id"
#   - "auth_user_id"
#   - "publisher_domain"
#   - "accept_language"
template = "{{ client_ip }}:{{ user_agent }}:{{ first_party_id }}:{{ auth_user_id }}:{{ publisher_domain }}:{{ accept_language }}"

# Custom headers to be included in every response
[response_headers]
X-Custom-Header = "custom header value"

# Request Signing Configuration
# Enable signing of OpenRTB requests and other API calls
[request_signing]
enabled = false  # Set to true to enable request signing
config_store_id = "<fastly-config-store-id>" # set config/secret store ids for key rotation
secret_store_id = "<fastly-secret-store-id>"

[integrations.prebid]
enabled = true
server_url = "http://68.183.113.79:8000"
timeout_ms = 1000
bidders = ["kargo", "rubicon", "appnexus", "openx"]
auto_configure = false
debug = false
# script_handler = "/prebid.js"

[integrations.nextjs]
enabled = false
rewrite_attributes = ["href", "link", "url"]

[integrations.testlight]
endpoint = "https://testlight.example/openrtb2/auction"
timeout_ms = 1200
rewrite_scripts = true

[integrations.permutive]
enabled = false
organization_id = ""
workspace_id = ""
project_id = ""
api_endpoint = "https://api.permutive.com"
secure_signals_endpoint = "https://secure-signals.permutive.app"
cache_ttl_seconds = 3600
rewrite_sdk = true

# Rewrite configuration for creative HTML/CSS processing
# [rewrite]
# Domains to exclude from first-party rewriting (supports wildcards like "*.example.com")
# URLs from these domains will be left as-is and not proxied
# exclude_domains = [
#     "*.edgecompute.app",
# ]

# Auction orchestration configuration
[auction]
enabled = true
strategy = "parallel_mediation"  # Options: "parallel_mediation", "parallel_only", "waterfall"
bidders = ["prebid", "aps_mock"]  # Use mock providers for testing
mediator = "gam_mock"
timeout_ms = 2000

# Mock APS Configuration (for testing)
[integrations.aps_mock]
enabled = true
timeout_ms = 800
bid_price = 2.50
latency_ms = 80
fill_rate = 1.0  # 1.0 = always bid, 0.5 = bid 50% of the time

# Real APS Configuration (disabled by default - enable when real integration is ready)
[integrations.aps]
enabled = false
pub_id = "your-aps-publisher-id"
endpoint = "https://aax.amazon-adsystem.com/e/dtb/bid"
timeout_ms = 800

# Mock GAM Configuration (for testing)
[integrations.gam_mock]
enabled = true
timeout_ms = 500
inject_house_bids = true
house_bid_price = 1.75
win_rate = 30  # Percentage (0-100) - GAM house ads win this % of time
latency_ms = 40

# Real GAM Configuration (disabled by default - enable when real integration is ready)
[integrations.gam]
enabled = false
network_id = "your-gam-network-id"
endpoint = "https://securepubads.g.doubleclick.net/gampad/ads"
timeout_ms = 500
