[[handlers]]
path = "^/_ts/admin"
username = "admin"
password = "replace-with-admin-password-32-bytes"

[publisher]
domain = "example.com"
cookie_domain = ".example.com"
origin_url = "https://origin.example.com"
# Optional: override outbound Host header while connecting to origin_url.
# origin_host_header_override = "www.example.com"
proxy_secret = "change-me-proxy-secret"

[ec]
ec_store = "ec_identity_store"
pull_sync_concurrency = 3
# cluster_trust_threshold = 10
# cluster_recheck_secs = 3600

# Edge Cookie identity is OFF by default: with no provider selected, Trusted
# Server runs statelessly and generates no Edge Cookie. Activate one by
# uncommenting the selector below (its [ec.providers.<key>] block must exist) or
# via the TRUSTED_SERVER__ec__provider environment variable. The built-in hmac
# provider is host-neutral; a vendor provider needs its own cargo feature.
# provider = "hmac"

[ec.providers.hmac]
passphrase = "trusted-server-placeholder-secret"

# Built-in host-signal provider: mints the identifier from the host's TLS JA4
# and HTTP/2 fingerprints instead of the client IP. Requires a host that
# supplies those signals (for example Fastly). Select with provider =
# "host-signals" and configure its own passphrase:
# [ec.providers.host-signals]
# passphrase = "replace-with-32-plus-byte-random-secret"

# Example partner configuration. Replace the token before validating/pushing.
# [[ec.partners]]
# name = "Example Partner"
# source_domain = "partner.example.com"
# openrtb_atype = 3
# bidstream_enabled = true
# api_token = "replace-with-partner-api-token-32-bytes-minimum"
# batch_rate_limit = 60
# pull_sync_enabled = false

# Device-detection provider. Selects how a request is classified into device
# signals (browser/bot gating). Default "builtin" classifies from the User-Agent
# alone and makes no host call, so a default deployment stays host-neutral. The
# opt-in "fastly" provider adds the host's TLS/H2 fingerprints to the gate.
# Override at deployment with TRUSTED_SERVER__device__provider.
# [device]
# provider = "builtin"   # or "fastly" to add TLS/H2 fingerprint evidence

# Geo / IP intelligence provider. No provider is the default: Trusted Server
# resolves no geolocation and makes no host geo call, so a default deployment is
# not tied to any host geo service. Opt into the host lookup with
# provider = "platform". Override with TRUSTED_SERVER__geo__provider.
#
# default_country is required. Trusted Server does not assume a jurisdiction for
# you, so the operator declares the baseline: the country (US) or country/region
# (US/CA) whose permissions.yaml rule is the default permission set for a request
# the geo provider leaves unmatched. The example uses FR (GDPR-EU), the most
# protective baseline where every permission requires a signal. Validated at
# startup.
[geo]
# provider = "platform"
default_country = "FR"

# Custom headers to include in every response.
# [response_headers]
# X-Robots-Tag = "noindex"

[request_signing]
enabled = false
config_store_id = "app_config"
secret_store_id = "secrets"

[integrations.prebid]
enabled = false
server_url = "https://prebid.example.com/openrtb2/auction"
timeout_ms = 1000
bidders = []
debug = false
client_side_bidders = []

[integrations.nextjs]
enabled = false
rewrite_attributes = ["href", "link", "siteBaseUrl", "siteProductionDomain", "url"]
max_combined_payload_bytes = 10485760

[integrations.testlight]
enabled = false
endpoint = "https://testlight.example.com/openrtb2/auction"
timeout_ms = 1200
rewrite_scripts = true

[integrations.didomi]
enabled = false
sdk_origin = "https://sdk.example.com"
api_origin = "https://api.example.com"

[integrations.sourcepoint]
enabled = false
rewrite_sdk = true
cdn_origin = "https://cdn.example.com"
cache_ttl_seconds = 3600

[integrations.permutive]
enabled = false
organization_id = ""
workspace_id = ""
project_id = ""
api_endpoint = "https://api.example.com"
secure_signals_endpoint = "https://secure-signals.example.com"

[integrations.lockr]
enabled = false
app_id = ""
api_endpoint = "https://identity.example.com"
sdk_url = "https://identity.example.com/trusted-server.js"
cache_ttl_seconds = 3600
rewrite_sdk = true

[integrations.datadome]
enabled = false
sdk_origin = "https://sdk.example.com"
api_origin = "https://api.example.com"
cache_ttl_seconds = 3600
rewrite_sdk = true

[integrations.gpt]
enabled = false
script_url = "https://ads.example.com/gpt.js"
cache_ttl_seconds = 3600
rewrite_script = true

[proxy]
# certificate_check = true
# allowed_domains = ["ads.example.com", "*.cdn.example.com"]

[auction]
enabled = false
providers = []
timeout_ms = 2000
allowed_context_keys = []

[integrations.aps]
enabled = false
pub_id = "your-aps-publisher-id"
endpoint = "https://aps.example.com/e/dtb/bid"
timeout_ms = 1000

[integrations.google_tag_manager]
enabled = false
container_id = "GTM-EXAMPLE"
upstream_url = "https://tags.example.com"

[integrations.adserver_mock]
enabled = false
endpoint = "https://adserver.example.com/mediate"
timeout_ms = 1000

[integrations.adserver_mock.context_query_params]
example_segments = "segments"

[debug]
ja4_endpoint_enabled = false
