[[handlers]]
path = "^/_ts/admin"
username = "admin"
password = "replace-with-admin-password-32-bytes"

[publisher]
domain = "example.com"
cookie_domain = ".example.com"
origin_url = "https://origin.example.com"
# Optional: override outbound Host header while connecting to origin_url.
# origin_host_header_override = "www.example.com"
proxy_secret = "change-me-proxy-secret"

[ec]
passphrase = "trusted-server-placeholder-secret"
ec_store = "ec_identity_store"
pull_sync_concurrency = 3
# cluster_trust_threshold = 10
# cluster_recheck_secs = 3600

# Example partner configuration. Replace the token before validating/pushing.
# [[ec.partners]]
# name = "Example Partner"
# source_domain = "partner.example.com"
# OpenRTB agent type; vendor-specific values are supported (PAIR uses 571187).
# openrtb_atype = 3
# bidstream_enabled = true
# api_token = "replace-with-partner-api-token-32-bytes-minimum"
# batch_rate_limit = 60
# pull_sync_enabled = false

# Custom headers to include in every response.
# [response_headers]
# X-Robots-Tag = "noindex"

[request_signing]
enabled = false
config_store_id = "app_config"
secret_store_id = "secrets"

[integrations.prebid]
enabled = false
server_url = "https://prebid.example.com/openrtb2/auction"
timeout_ms = 1000
bidders = []
debug = false
client_side_bidders = []
# Keep selected GAM inventory out of Trusted Server's Prebid refresh auctions.
# Matching slots still refresh through GAM.
# excluded_gam_ad_unit_path_suffixes = ["/trackingonly"]
# Runtime bundle metadata. Set these after running `ts prebid bundle` and uploading the bundle.
# external_bundle_url = "https://assets.example.com/prebid/trusted-prebid-<sha256>.js"
# external_bundle_sha256 = "<manifest sha256>"
# external_bundle_sri = "<manifest sri>"

[integrations.prebid.bundle]
adapters = ["rubicon"]
# user_id_modules = ["sharedIdSystem"]

[integrations.nextjs]
enabled = false
rewrite_attributes = ["href", "link", "siteBaseUrl", "siteProductionDomain", "url"]
max_combined_payload_bytes = 10485760

# Session-scoped auction-to-creative trace diagnostics. When enabled, visit a
# publisher page with `?ts_console=1` or `?ts_console=true` to open the console.
[integrations.ad_trace]
enabled = false

[integrations.testlight]
enabled = false
endpoint = "https://testlight.example.com/openrtb2/auction"
timeout_ms = 1200
rewrite_scripts = true

[integrations.didomi]
enabled = false
sdk_origin = "https://sdk.example.com"
api_origin = "https://api.example.com"

[integrations.sourcepoint]
enabled = false
rewrite_sdk = true
cdn_origin = "https://cdn.example.com"
cache_ttl_seconds = 3600

[integrations.permutive]
enabled = false
organization_id = ""
workspace_id = ""
project_id = ""
api_endpoint = "https://api.example.com"
secure_signals_endpoint = "https://secure-signals.example.com"

[integrations.lockr]
enabled = false
app_id = ""
api_endpoint = "https://identity.example.com"
sdk_url = "https://identity.example.com/trusted-server.js"
cache_ttl_seconds = 3600
rewrite_sdk = true

[integrations.datadome]
enabled = false
sdk_origin = "https://sdk.example.com"
api_origin = "https://api.example.com"
cache_ttl_seconds = 3600
rewrite_sdk = true

[integrations.gpt]
enabled = false
script_url = "https://ads.example.com/gpt.js"
cache_ttl_seconds = 3600
rewrite_script = true

[proxy]
# certificate_check = true
# Required for integrations.prebid.external_bundle_url and first-party proxy redirects.
# allowed_domains = ["ads.example.com", "assets.example.com", "*.cdn.example.com"]

[auction]
enabled = false
# Defaults to false. Set true to rewrite winning-bid adm to first-party endpoints,
# converting proxy/click URLs and injecting the creative TSJS runtime.
# Sanitization is controlled separately by `sanitize_creatives` below.
rewrite_creatives = false
# Strip executable markup (script/object/embed/form/...) from winning-bid adm,
# removing those elements together with their inner content.
#
# Defaults to false: creatives are delivered exactly as the bidder returned them.
# Enable whenever creatives can render in a context that shares the publisher's
# origin — it is the primary defence there.
#
# Set false only when creatives render in a foreign-origin frame (for example the
# Prebid Universal Creative inside the ad server's iframe), where the markup cannot
# reach the publisher origin. Sanitization removes script-based creatives entirely,
# so leaving it enabled on a script-heavy demand stack silently blanks those slots.
sanitize_creatives = false
providers = []
timeout_ms = 2000
allowed_context_keys = []

[integrations.aps]
enabled = false
account_id = "example-aps-account-id"
endpoint = "https://web.ads.aps.amazon-adsystem.com/e/pb/bid"
timeout_ms = 1000
# Include raw APS request/response data in /auction metadata on test sites only.
debug = false
# Set both when the deployment hostname differs from APS-authorized inventory.
# inventory_domain = "publisher.example"
# inventory_page_origin = "https://www.publisher.example"
# Script creatives require separate security validation before opt-in.
allow_script_creatives = false

[integrations.google_tag_manager]
enabled = false
container_id = "GTM-EXAMPLE"
upstream_url = "https://tags.example.com"

[integrations.adserver_mock]
enabled = false
endpoint = "https://adserver.example.com/mediate"
timeout_ms = 1000

[integrations.adserver_mock.context_query_params]
example_segments = "segments"

[debug]
ja4_endpoint_enabled = false

# Inject a `<!-- ts-debug: ... -->` HTML comment before `</body>` dumping a
# redacted per-provider auction result: pipeline stats plus every provider
# response, with each bid's creative previewed (not the full markup) and
# provider metadata filtered to a fail-closed allowlist.
# Visible in page source and injects (bounded) raw HTML from SSPs. NEVER enable
# in production.
auction_html_comment = false

[creative_opportunities]
gam_network_id = "123456789"
# FCP is not affected by this value — body content above </body> has already
# streamed and painted before the hold begins. What this caps is the slip on
# DOMContentLoaded and window.load. Worst case: a cache-hit page where origin
# drains in <50 ms but the auction runs to the limit. 500 ms is the recommended
# default; raise only if your SSPs need more headroom and your analytics confirm
# the DCL slip is acceptable.
auction_timeout_ms = 500  # override via TRUSTED_SERVER__CREATIVE_OPPORTUNITIES__AUCTION_TIMEOUT_MS
price_granularity = "dense"

# `gam_unit_path` may be a template. Supported placeholders:
#   {network_id} -> gam_network_id
#   {slot_id}    -> the slot's id
#   {section}    -> first path segment of the request, sanitized to
#                   [A-Za-z0-9_-]; `section_root` below is used for "/".
# A template with no placeholders (or an absent gam_unit_path) keeps the old
# behavior: verbatim path, or the default `/<network_id>/<slot_id>`.
#
# `section_root` is REQUIRED when any slot's template uses {section}. There is no
# default — the home-section name is publisher-specific. Must be [A-Za-z0-9_-]+.
section_root = "home"

# No slot templates are enabled in the checked-in default config. Add
# `[[creative_opportunities.slot]]` entries via private config or override the
# entire array via:
# TRUSTED_SERVER__CREATIVE_OPPORTUNITIES__SLOT='[{"id":"...","gam_unit_path":"...",...}]'
#
# Example templated slot (one rule serves every section):
# [[creative_opportunities.slot]]
# id = "ad-header"
# gam_unit_path = "/{network_id}/example/{section}"
# page_patterns = ["/", "/news/*", "/reviews/*"]
# formats = [{ width = 728, height = 90 }]
#   "/"          -> /123456789/example/home
#   "/news/x"    -> /123456789/example/news
#   "/reviews/y" -> /123456789/example/reviews
