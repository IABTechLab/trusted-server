name = "trusted-server"
main = "build/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# No [build] section — bundle is pre-built in CI; wrangler dev must not rebuild.

[[kv_namespaces]]
binding = "TRUSTED_SERVER_KV"
id = "ci-local-kv"

[vars]
# Settings are baked into the WASM binary at build time; this JSON only needs
# to satisfy any runtime config-store lookups (e.g. request-signing keys).
TRUSTED_SERVER_CONFIG = "{}"
