<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prebid · Trusted Server Kitchen Sink</title>
  <meta name="description" content="Minimal Prebid fixture for Trusted Server.">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="prebid.js" async data-ts-test="publisher-prebid-placeholder"></script>
  <script defer src="assets/app.js"></script>
  <script defer src="assets/prebid-demo.js"></script>
</head>
<body data-page="prebid">
  <header class="site-header">
    <a class="brand" href="./">Trusted Server Kitchen Sink</a>
    <nav class="nav" aria-label="Primary">
      <a href="./" data-nav="home">Home</a>
      <a href="auction.html" data-nav="auction">Auction</a>
      <a href="prebid.html" data-nav="prebid">Prebid</a>
      <a href="identity.html" data-nav="identity">Identity</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Prebid</h1>
      <p>Loads a publisher <code>prebid.js</code> placeholder so the Prebid integration can replace it and inject TSJS config.</p>
    </section>

    <section class="card">
      <div class="actions">
        <button id="queue-prebid">Queue requestBids</button>
        <button id="refresh-prebid" class="secondary">Refresh state</button>
        <button id="clear-prebid" class="secondary">Clear</button>
        <span id="prebid-status" class="status-line">Idle</span>
      </div>
    </section>

    <section class="ad-slot" data-ad-slot="header-banner" data-width="728" data-height="90" aria-label="Prebid ad slot">
      <div class="ad-slot__head">
        <strong>header-banner</strong>
        <span class="ad-slot__meta">728×90</span>
      </div>
      <div class="ad-slot__mount"><div class="ad-placeholder">No creative rendered</div></div>
    </section>

    <section class="card-grid card-grid--wide">
      <article class="card">
        <h2>TSJS config</h2>
        <pre id="prebid-config-json">Not inspected yet.</pre>
      </article>
      <article class="card">
        <h2>Prebid state</h2>
        <pre id="prebid-state-json">Not inspected yet.</pre>
      </article>
    </section>
  </main>
</body>
</html>
