[package]
name = "integration-tests"
version = "0.1.0"
edition = "2024"
publish = false

[[test]]
name = "integration"
path = "tests/integration.rs"
harness = true

[dev-dependencies]
testcontainers = "0.25"
reqwest = { version = "0.12", features = ["blocking"] }
scraper = "0.21"
tempfile = "3.0"
toml = "0.8"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
error-stack = "0.5"
derive_more = { version = "1.0", features = ["display"] }
tokio = { version = "1.0", features = ["time", "rt"] }
