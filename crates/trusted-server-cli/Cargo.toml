[workspace]

[package]
name = "trusted-server-cli"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "trusted_server_cli"
path = "src/lib.rs"

[[bin]]
name = "ts"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["net", "rt-multi-thread", "macros", "io-util", "signal"] }
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
rustls = "0.23"
tokio-rustls = "0.26"
rcgen = "0.13"
time = "0.3"
rustls-pemfile = "2"
clap = { version = "4", features = ["derive", "env"] }
error-stack = "0.6"
derive_more = { version = "2.0", features = ["display", "error"] }
log = "0.4"
env_logger = "0.11"
base64 = "0.22"
directories = "5"

[dev-dependencies]
tempfile = "3"
reqwest = { version = "0.12", features = ["blocking"] }

[lints.clippy]
unwrap_used = "deny"
panic = "deny"
print_stdout = "warn"
print_stderr = "warn"
