[package]
name = "trusted-server-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "ts"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
base64 = { workspace = true }
clap = { workspace = true }
dialoguer = { workspace = true }
derive_more = { workspace = true, features = ["display"] }
error-stack = { workspace = true }
log = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
scraper = { workspace = true }
serde = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
which = { workspace = true }
chromiumoxide = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
toml = { workspace = true }
trusted-server-core = { workspace = true }
url = { workspace = true }
keyring = { workspace = true }
uuid = { workspace = true }
# `ts dev lint domains` and `ts dev install-hooks` (spec
# docs/superpowers/specs/2026-05-18-check-domains-design.md).
# Versions chosen during the Phase 2 feasibility spike; verified
# via `cargo tree -p gix -p gix-config` that no duplicate
# versions land in the lock file.
gix = { version = "0.83", default-features = false, features = [
    "blob-diff",
    "index",
    "revision",
    "sha1",
] }
gix-config = "0.56"

[dev-dependencies]
temp-env = { workspace = true }
tempfile = { workspace = true }
