[package]
name = "trusted-server-cli"
version = "0.1.0"
authors = []
edition = "2024"
publish = false
license = "Apache-2.0"

[[bin]]
name = "ts"
path = "src/main.rs"

[lints]
workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
clap = { workspace = true }
edgezero-cli = { workspace = true }
log = { workspace = true }
trusted-server-core = { workspace = true }

# `ts dev proxy` is macOS-only — CA trust via the login keychain, Safari
# automation via `networksetup`, and a native TLS / networking stack. Scoping
# these dependencies to macOS keeps unsupported targets (notably the
# repo-default `wasm32-wasip1` from `.cargo/config.toml`) from trying to build
# `tokio`, `ring`, or `aws-lc-sys` for a target they do not support; on those
# targets the `dev` subcommand is simply absent.
[target.'cfg(target_os = "macos")'.dependencies]
tokio = { version = "1", features = ["net", "rt-multi-thread", "macros", "io-util", "signal"] }
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
bytes = "1"
rustls = "0.23"
tokio-rustls = "0.26"
webpki-roots = "0.26"
rcgen = { version = "0.13", features = ["x509-parser"] }
time = "0.3"
rustls-pemfile = "2"
error-stack = "0.6"
derive_more = { version = "2.0", features = ["display", "error"] }
base64 = "0.22"
directories = "5"
# Secure (O_EXCL, random-named, 0700) temp dirs for throwaway browser profiles.
tempfile = "3"

[target.'cfg(target_os = "macos")'.dev-dependencies]
reqwest = { version = "0.12", features = ["blocking"] }
x509-parser = "0.16"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tempfile = { workspace = true }
