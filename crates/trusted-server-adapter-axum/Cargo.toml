[package]
name = "trusted-server-adapter-axum"
version = "0.1.0"
edition = "2024"
publish = false

# NOTE: This crate is excluded from the workspace because the workspace default
# target is wasm32-wasip1 (set in .cargo/config.toml). The Axum adapter requires
# a native host target. Build and test via scripts/axum-dev-server.sh or the
# CI test-axum job.

[lints.clippy]
unwrap_used = "deny"
expect_used = "allow"
panic = "deny"
module_name_repetitions = "allow"
must_use_candidate = "warn"
doc_markdown = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
needless_pass_by_value = "warn"
redundant_closure_for_method_calls = "warn"
print_stdout = "warn"
print_stderr = "warn"
dbg_macro = "warn"

[lib]
name = "trusted_server_adapter_axum"
path = "src/lib.rs"

[[bin]]
name = "trusted-server-axum"
path = "src/main.rs"

[dependencies]
async-trait = "0.1"
edgezero-adapter-axum = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", features = ["axum"] }
edgezero-core = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1" }
error-stack = "0.6"
log = "0.4.29"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1.0.149"
tokio = { version = "1.49", features = ["rt-multi-thread", "macros", "sync", "time"] }
trusted-server-core = { path = "../trusted-server-core" }
trusted-server-js = { path = "../js" }

[dev-dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1.49", features = ["rt-multi-thread", "macros"] }
edgezero-adapter-axum = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", features = ["axum"] }
edgezero-core = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1" }
