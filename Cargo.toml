[workspace]
resolver = "2"
members = [
    "crates/trusted-server-core",
    "crates/trusted-server-adapter-fastly",
    "crates/js",
    "crates/openrtb",
]
# integration-tests is intentionally excluded from workspace members because it
# requires a native target (testcontainers, reqwest) while the workspace default
# is wasm32-wasip1. Run it via: ./scripts/integration-tests.sh
exclude = [
    "crates/integration-tests",
    "crates/openrtb-codegen",
]

default-members = [
    "crates/trusted-server-core",
    "crates/trusted-server-adapter-fastly",
]

[workspace.lints.clippy]
# Correctness - Force explicit error handling in production code
unwrap_used = "deny"
expect_used = "allow"  # Allow expect with context message
panic = "deny"

# Style
module_name_repetitions = "allow"
must_use_candidate = "warn"

# Pedantic (selective)
doc_markdown = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
needless_pass_by_value = "warn"  # Encourage borrowing over ownership
redundant_closure_for_method_calls = "warn"

# Restriction (selective)
print_stdout = "warn"
print_stderr = "warn"
dbg_macro = "warn"

[profile.release]
debug = 1

[workspace.dependencies]
async-trait = "0.1"
base64 = "0.22"
brotli = "8.0"
build-print = "1.0.1"
bytes = "1.11"
chacha20poly1305 = "0.10"
chrono = "0.4.44"
config = "0.15.19"
cookie = "0.18.1"
derive_more = { version = "2.0", features = ["display", "error"] }
ed25519-dalek = { version = "2.2", features = ["rand_core"] }
edgezero-adapter-axum = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", default-features = false }
edgezero-adapter-cloudflare = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", default-features = false }
edgezero-adapter-fastly = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", default-features = false }
edgezero-core = { git = "https://github.com/stackpop/edgezero", rev = "38198f9839b70aef03ab971ae5876982773fc2a1", default-features = false }
error-stack = "0.6"
fastly = "0.11.12"
fern = "0.7.1"
flate2 = "1.1"
futures = "0.3"
hex = "0.4.3"
hmac = "0.12.1"
http = "1.4.0"
iab_gpp = "0.1"
jose-jwk = "0.1.2"
log = "0.4.29"
log-fastly = "0.11.12"
lol_html = "2.7.2"
matchit = "0.9"
mime = "0.3"
rand = "0.8"
regex = "1.12.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
subtle = "2.6"
temp-env = "0.3.6"
tokio = { version = "1.49", features = ["sync", "macros", "io-util", "rt", "time"] }
tokio-test = "0.4"
toml = "1.1"
trusted-server-core = { path = "crates/trusted-server-core" }
url = "2.5.8"
urlencoding = "2.1"
uuid = { version = "1.18", features = ["v4"] }
validator = { version = "0.20", features = ["derive"] }
which = "8"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
